name: Bug report
description: Report a reproducible repository, validator, catalog, documentation, or published-skill defect.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Remove credentials and private data before submitting.
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Repository validation
        - Catalog or schema
        - Documentation
        - Published skill
        - Installation
        - Other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Repository, release, or skill version
      placeholder: main at commit SHA, v0.1.0, or skill-name 1.2.3
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Provide the smallest complete sequence that demonstrates the problem.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include OS, Python version, Hermes version, and relevant tools.
  - type: checkboxes
    id: safety
    attributes:
      label: Safety check
      options:
        - label: I removed credentials, private data, and identifying logs.
          required: true
