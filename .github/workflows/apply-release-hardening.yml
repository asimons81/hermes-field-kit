name: Apply release hardening

on:
  pull_request:
    branches:
      - feat/field-kit-release-wave
  workflow_dispatch:

permissions:
  contents: write

env:
  PYTHONDONTWRITEBYTECODE: "1"

concurrency:
  group: field-kit-release-hardening
  cancel-in-progress: true

jobs:
  harden:
    if: github.event.pull_request.head.ref == 'feat/field-kit-release-wave-hardening'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out staging branch
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          ref: feat/field-kit-release-wave-hardening
          persist-credentials: true
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version: "3.11"
      - name: Reconstruct and apply hardening patch
        shell: bash
        run: |
          cat .hardening/chunk* > /tmp/release-hardening.b64
          base64 --decode /tmp/release-hardening.b64 | gzip --decompress > scripts/apply_release_hardening.py
          python -B scripts/apply_release_hardening.py
          rm -rf .hardening scripts/apply_release_hardening.py hardening-validation.txt
      - name: Validate hardened repository
        shell: bash
        run: |
          python -B -m unittest discover -s tests
          python -B scripts/validate.py
          python -B scripts/validate_release_wave.py
          git diff --check
      - name: Package validated tree
        shell: bash
        run: |
          tar --exclude=.git --exclude=.github/workflows/apply-release-hardening.yml -czf /tmp/hardened-field-kit-tree.tar.gz .
          sha256sum /tmp/hardened-field-kit-tree.tar.gz > /tmp/hardened-field-kit-tree.sha256
      - name: Upload validated tree
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: hardened-field-kit-tree
          path: |
            /tmp/hardened-field-kit-tree.tar.gz
            /tmp/hardened-field-kit-tree.sha256
          if-no-files-found: error
          retention-days: 1
      - name: Publish atomic promotion object
        env:
          MAIN_BASE_SHA: b045e30340f290e217d20880e5c206092374085c
          PROMOTION_BRANCH: feat/field-kit-release-wave-promotion
        shell: bash
        run: |
          rm -rf /tmp/field-kit-promotion
          mkdir -p /tmp/field-kit-promotion
          tar \
            --exclude=.git \
            --exclude=.hardening \
            --exclude=original-release \
            --exclude=.github/workflows/apply-release-hardening.yml \
            --exclude=hardening-validation.txt \
            -cf - . | tar -xf - -C /tmp/field-kit-promotion

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          export GIT_INDEX_FILE=/tmp/field-kit-promotion.index
          rm -f "$GIT_INDEX_FILE"
          git --git-dir="$GITHUB_WORKSPACE/.git" --work-tree=/tmp/field-kit-promotion read-tree --empty
          git --git-dir="$GITHUB_WORKSPACE/.git" --work-tree=/tmp/field-kit-promotion add -A
          tree_sha=$(git --git-dir="$GITHUB_WORKSPACE/.git" --work-tree=/tmp/field-kit-promotion write-tree)
          commit_sha=$(printf '%s\n' 'feat: add hardened Hermes Field Kit release wave' | git commit-tree "$tree_sha" -p "$MAIN_BASE_SHA")
          git push --force origin "$commit_sha:refs/heads/$PROMOTION_BRANCH"

          python -B - <<PY
          import json
          from pathlib import Path
          Path('/tmp/promotion-commit.json').write_text(json.dumps({
              'commit_sha': '$commit_sha',
              'tree_sha': '$tree_sha',
              'parent_sha': '$MAIN_BASE_SHA',
              'promotion_branch': '$PROMOTION_BRANCH',
          }, indent=2), encoding='utf-8')
          PY
      - name: Upload promotion metadata
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: field-kit-promotion-commit
          path: /tmp/promotion-commit.json
          if-no-files-found: error
          retention-days: 1
