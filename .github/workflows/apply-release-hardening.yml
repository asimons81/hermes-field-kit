name: Apply release hardening

on:
  pull_request:
    branches:
      - feat/field-kit-release-wave
  workflow_dispatch:

permissions:
  contents: read

env:
  PYTHONDONTWRITEBYTECODE: "1"

concurrency:
  group: field-kit-release-hardening
  cancel-in-progress: true

jobs:
  harden:
    if: github.event.pull_request.head.ref == 'feat/field-kit-release-wave-hardening'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out staging branch
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          ref: feat/field-kit-release-wave-hardening
          persist-credentials: false
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version: "3.11"
      - name: Reconstruct and apply hardening patch
        shell: bash
        run: |
          cat .hardening/chunk* > /tmp/release-hardening.b64
          base64 --decode /tmp/release-hardening.b64 | gzip --decompress > scripts/apply_release_hardening.py
          python -B scripts/apply_release_hardening.py
          rm -rf .hardening scripts/apply_release_hardening.py hardening-validation.txt
      - name: Validate hardened repository
        shell: bash
        run: |
          python -B -m unittest discover -s tests
          python -B scripts/validate.py
          python -B scripts/validate_release_wave.py
          git diff --check
      - name: Package validated tree
        shell: bash
        run: |
          tar --exclude=.git --exclude=.github/workflows/apply-release-hardening.yml -czf /tmp/hardened-field-kit-tree.tar.gz .
          sha256sum /tmp/hardened-field-kit-tree.tar.gz > /tmp/hardened-field-kit-tree.sha256
      - name: Upload validated tree
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: hardened-field-kit-tree
          path: |
            /tmp/hardened-field-kit-tree.tar.gz
            /tmp/hardened-field-kit-tree.sha256
          if-no-files-found: error
          retention-days: 1
