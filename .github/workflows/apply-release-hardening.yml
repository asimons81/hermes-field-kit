name: Apply release hardening

on:
  pull_request:
    branches:
      - feat/field-kit-release-wave
  workflow_dispatch:

permissions:
  contents: write

env:
  PYTHONDONTWRITEBYTECODE: "1"

jobs:
  harden:
    if: github.event.pull_request.head.ref == 'feat/field-kit-release-wave-hardening'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out staging branch
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          ref: feat/field-kit-release-wave-hardening
          persist-credentials: true
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version: "3.11"
      - name: Reconstruct and apply hardening patch
        shell: bash
        run: |
          cat .hardening/chunk* > /tmp/release-hardening.b64
          base64 --decode /tmp/release-hardening.b64 | gzip --decompress > scripts/apply_release_hardening.py
          python -B scripts/apply_release_hardening.py
          rm -rf .hardening scripts/apply_release_hardening.py
      - name: Validate hardened repository
        shell: bash
        run: |
          set +e
          python -B -m unittest discover -s tests > /tmp/root-tests.log 2>&1; root_tests=$?
          python -B scripts/validate.py > /tmp/repo-validator.log 2>&1; repo_validator=$?
          python -B scripts/validate_release_wave.py > /tmp/release-validator.log 2>&1; release_validator=$?
          git diff --check > /tmp/diff-check.log 2>&1; diff_check=$?
          set -e
          if [ "$root_tests" -ne 0 ] || [ "$repo_validator" -ne 0 ] || [ "$release_validator" -ne 0 ] || [ "$diff_check" -ne 0 ]; then
            {
              echo "=== root tests ($root_tests) ==="
              cat /tmp/root-tests.log
              echo "=== repository validator ($repo_validator) ==="
              cat /tmp/repo-validator.log
              echo "=== release validator ($release_validator) ==="
              cat /tmp/release-validator.log
              echo "=== diff check ($diff_check) ==="
              cat /tmp/diff-check.log
            } > hardening-validation.txt
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -f hardening-validation.txt
            if ! git diff --cached --quiet; then
              git commit -m "chore: capture hardening validation failure"
              git push origin HEAD:feat/field-kit-release-wave-hardening
            fi
            exit 1
          fi
          rm -f hardening-validation.txt
          cat /tmp/root-tests.log
          cat /tmp/repo-validator.log
          cat /tmp/release-validator.log
      - name: Remove temporary workflow and commit
        shell: bash
        run: |
          rm .github/workflows/apply-release-hardening.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: harden Field Kit release wave"
          git push origin HEAD:feat/field-kit-release-wave-hardening
